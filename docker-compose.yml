services:

  # ── React SPA (내부 서빙 전용 — 포트 외부 노출 없음) ─────
  frontend:
    build: ./frontend
    container_name: malbeot-frontend
    networks:
      - portfolio-net
    restart: unless-stopped

  # ── FastAPI 백엔드 ────────────────────────────────────────
  app:
    build: ./backend
    container_name: malbeot-app
    env_file:
      - .env
    networks:
      - portfolio-net
    restart: unless-stopped

networks:
  portfolio-net:
    external: true
